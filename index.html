<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>過去問データベース | KAKOMON DATABASE</title>
    
    <script src="database1.js"></script>
    <script src="database2.js"></script>
    
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(30, 41, 59, 0.7);
            --neon-blue: #00f2fe;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-yellow: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 242, 254, 0.3);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.1), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%; padding: 40px 20px 20px; text-align: center;
        }

        h1 {
            font-size: 2.5rem; font-weight: 800; letter-spacing: 3px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.4));
        }

        .subtitle { color: var(--text-muted); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }

        main {
            width: 100%; max-width: 900px; padding: 20px;
            flex-grow: 1; display: flex; flex-direction: column;
        }

        .view-section {
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            padding: 30px;
        }

        /* ===== メニュー ===== */
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .menu-item { cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; background: rgba(255,255,255,0.05); }
        .menu-item:hover {
            transform: translateY(-5px); border-color: var(--neon-blue);
            box-shadow: 0 10px 30px var(--border-glow); background: rgba(15, 23, 42, 0.8);
        }
        .menu-title { font-size: 1.3rem; color: var(--neon-blue); margin-bottom: 10px; font-weight: bold; }
        .menu-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }

        /* ===== 設定パネル ===== */
        .settings-panel {
            background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; padding: 14px 18px; margin-bottom: 16px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: center;
        }

        /* ===== 問題選択グリッド（大問廃止・フラット化） ===== */
        .problem-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px; margin-bottom: 20px;
        }

        /* ===== 問題ボタン ===== */
        .problem-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 10px 8px; border-radius: 8px;
            text-align: center; cursor: pointer; transition: all 0.2s; font-weight: bold;
            font-size: 0.85rem; line-height: 1.3; position: relative; min-height: 52px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
        }
        .problem-item:hover {
            background: rgba(0, 242, 254, 0.1); border-color: var(--neon-blue); transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2);
        }
        .problem-item.selected {
            background: rgba(0, 242, 254, 0.18); border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0,242,254,0.25);
        }
        .problem-item-sub { font-size: 0.7rem; color: var(--text-muted); font-weight: normal; display: block; line-height: 1.2; }

        /* 選択済みスタート */
        .start-selected-bar {
            margin-top: 14px; padding: 12px 16px; background: rgba(0,242,254,0.07);
            border: 1px solid rgba(0,242,254,0.2); border-radius: 10px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
        }
        .start-selected-bar .sel-info { font-size: 0.9rem; color: var(--text-muted); }
        .start-selected-bar .sel-info span { color: var(--neon-blue); font-weight: bold; }

        /* ===== 進捗バー ===== */
        .progress-bar-wrap {
            width: 100%; background: rgba(255,255,255,0.08); border-radius: 99px;
            height: 6px; margin-bottom: 18px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 99px; background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            transition: width 0.5s ease;
        }

        /* ===== クイズ領域 ===== */
        .quiz-header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 10px; }
        .quiz-progress-text { color: var(--neon-purple); font-weight: bold; font-size: 1rem; }
        .question-number-label {
            display: inline-block; background: rgba(0, 242, 254, 0.12); border: 1px solid rgba(0, 242, 254, 0.4);
            border-radius: 8px; padding: 5px 14px; color: var(--neon-blue); font-weight: bold; font-size: 1.0rem;
            margin-bottom: 14px; letter-spacing: 0.5px;
        }
        .question-text { font-size: 1.15rem; line-height: 1.9; margin-bottom: 30px; }

        /* ===== タイピング空欄補充 ===== */
        .blank-wrap { position: relative; display: inline-block; margin: 0 4px; vertical-align: bottom; }
        .blank-input {
            background: rgba(0, 0, 0, 0.3); border: none; border-bottom: 2px solid var(--neon-purple);
            color: var(--text-main); font-size: 1.1rem; padding: 4px 8px; width: 140px; text-align: center;
            border-radius: 4px 4px 0 0; outline: none; transition: all 0.3s;
        }
        .blank-input:focus { background: rgba(139, 92, 246, 0.2); border-bottom-color: var(--neon-blue); }
        .blank-input.correct { border-bottom-color: var(--neon-green); color: var(--neon-green); background: rgba(16, 185, 129, 0.1); }
        .blank-input.incorrect { border-bottom-color: var(--neon-red); color: var(--neon-red); background: rgba(239, 68, 68, 0.1); text-decoration: line-through; }

        /* ===== ドラッグ＆ドロップ空欄補充 ===== */
        .word-bank {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; padding: 20px;
            background: rgba(0, 0, 0, 0.2); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.2);
            min-height: 80px; align-items: center; justify-content: center;
        }
        .draggable-item {
            background: linear-gradient(135deg, var(--neon-blue), #3b82f6); color: #000; font-weight: bold;
            padding: 8px 16px; border-radius: 20px; cursor: grab; user-select: none; font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2); transition: transform 0.1s;
        }
        .draggable-item:active { cursor: grabbing; transform: scale(0.95); }
        .drop-zone-wrap { position: relative; display: inline-block; margin: 0 6px; vertical-align: bottom; }
        .drop-zone {
            display: inline-flex; align-items: center; justify-content: center; min-width: 120px; height: 38px;
            border-bottom: 2px dashed var(--neon-purple); transition: all 0.3s;
            border-radius: 4px 4px 0 0; background: rgba(0,0,0,0.3);
        }
        .drop-zone.drag-over { background: rgba(139, 92, 246, 0.3); border-bottom-color: var(--neon-blue); }
        .drop-zone .draggable-item { margin: 0; box-shadow: none; font-size: 0.95rem; padding: 4px 12px; }
        .drop-zone.correct { border-bottom-color: var(--neon-green) !important; background: rgba(16, 185, 129, 0.1); }
        .drop-zone.incorrect { border-bottom-color: var(--neon-red) !important; background: rgba(239, 68, 68, 0.1); }

        /* ===== ボタン類 ===== */
        .controls { display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 14px 24px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold;
            cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--neon-blue), #3b82f6); color: #000; flex-grow: 2; box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4); }
        .btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.2); flex-grow: 1; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--text-main); }

        /* ===== 結果画面 ===== */
        .score-circle {
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--neon-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 30px auto; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(0, 242, 254, 0.1);
        }
        .score-num { font-size: 3rem; font-weight: bold; color: var(--neon-blue); }
        .score-message { font-size: 1.2rem; font-weight: bold; margin: 10px 0 20px; }
    </style>
</head>
<body onload="initApp()">

    <header>
        <h1>過去問データベース</h1>
        <div class="subtitle">KAKOMON DATABASE</div>
    </header>

    <main>
        <section id="view-menu" class="view-section active">
            <div style="text-align: center; margin-bottom: 20px; color: var(--text-muted);">
                学習を開始するセッションを選択してください。
            </div>
            <div class="menu-grid" id="menu-container">
                </div>
        </section>

        <section id="view-problem-select" class="view-section">
            <div class="glass-card">
                <h2 id="problem-select-title" style="color: var(--neon-blue); margin-bottom: 6px; text-align: center;"></h2>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;">解きたい問題を選択してください</p>

                <div class="settings-panel">
                    <button class="btn btn-secondary" onclick="selectAllProblems(true)" style="padding: 8px 12px; font-size: 0.8rem;">☑ 全選択</button>
                    <button class="btn btn-secondary" onclick="selectAllProblems(false)" style="padding: 8px 12px; font-size: 0.8rem;">☐ 全解除</button>
                </div>

                <div id="problem-container"></div>

                <div class="start-selected-bar" id="start-selected-bar">
                    <div class="sel-info">選択中: <span id="sel-count">0</span> 問</div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn btn-secondary" style="padding:10px 18px; font-size:0.9rem;" onclick="startSelectedQuestions()">▶ 選択問題を解く</button>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" style="width: 100%;" onclick="switchView('view-menu')">← セッション選択に戻る</button>
                </div>
            </div>
        </section>

        <section id="view-quiz" class="view-section">
            <div class="glass-card">
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progress-bar" style="width: 0%;"></div>
                </div>

                <div class="quiz-header">
                    <span class="quiz-progress-text" id="quiz-progress"></span>
                </div>

                <div id="word-bank-area" style="display: none;">
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;">語群 (ドラッグして空欄に配置してください)</div>
                    <div id="word-bank" class="word-bank" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="dropToBank(event)"></div>
                </div>

                <div id="question-area" class="question-text"></div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="switchView('view-problem-select')">問題一覧へ</button>
                    <button class="btn btn-primary" id="action-btn" onclick="checkAnswer()">解答する</button>
                </div>
            </div>
        </section>

        <section id="view-result" class="view-section">
            <div class="glass-card" style="text-align: center;">
                <h2 style="font-size: 2rem; margin-bottom: 8px;">演習完了</h2>
                <p style="color: var(--text-muted); margin-bottom: 0;">あなたのスコア</p>

                <div class="score-circle">
                    <div class="score-num" id="final-score">0/0</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">獲得スコア</div>
                </div>

                <div class="score-message" id="score-message">お疲れ様でした！</div>

                <div class="controls" style="margin-top: 20px; justify-content: center;">
                    <button class="btn btn-secondary" onclick="switchView('view-problem-select')">問題一覧へ戻る</button>
                    <button class="btn btn-primary" onclick="switchView('view-menu')">メニューへ戻る</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        // ==========================================
        // 開発用ダミーデータ（外部ファイルがない場合のフォールバック）
        // 実際の運用では外部の database1.js 等のデータが使用されます
        // ==========================================
        const dummyData = [
            { id: 1, type: "typing", text: "日本の首都は<span class='blank-wrap'><input type='text' class='blank-input' data-answer='東京'></span>である。" },
            { id: 2, type: "dragdrop", text: "吾輩は<span class='drop-zone-wrap'><div class='drop-zone' ondragover='allowDrop(event)' ondragleave='dragLeave(event)' ondrop='dropToZone(event)' data-answer='猫'></div></span>である。", wordBank: ["犬", "猫", "鳥"] }
        ];

        let currentSessionData = typeof database1 !== 'undefined' ? database1 : dummyData;
        let selectedProblems = [];
        let currentProblemIndex = 0;
        let correctCount = 0;

        // アプリケーション初期化
        function initApp() {
            renderMenu();
        }

        // ビューの切り替え
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // メニュー画面の描画
        function renderMenu() {
            const menuContainer = document.getElementById('menu-container');
            menuContainer.innerHTML = `
                <div class="menu-item" onclick="openProblemSelect('データベース 1', currentSessionData)">
                    <div class="menu-title">過去問 セッション 1</div>
                    <div class="menu-desc">タイピングとドラッグ＆ドロップ問題の演習</div>
                </div>
            `;
        }

        // 問題選択画面を開く
        function openProblemSelect(title, data) {
            document.getElementById('problem-select-title').innerText = title;
            currentSessionData = data;
            
            // 選択状態の初期化
            currentSessionData.forEach(p => p.selected = false);
            
            renderProblemGrid();
            updateSelectedCount();
            switchView('view-problem-select');
        }

        // 設問一覧をフラットに描画
        function renderProblemGrid() {
            const container = document.getElementById('problem-container');
            container.innerHTML = '';
            
            const grid = document.createElement('div');
            grid.className = 'problem-grid';
            
            currentSessionData.forEach((prob, index) => {
                const btn = document.createElement('div');
                btn.className = `problem-item ${prob.selected ? 'selected' : ''}`;
                btn.innerHTML = `問${index + 1}`;
                btn.onclick = () => {
                    prob.selected = !prob.selected;
                    btn.classList.toggle('selected', prob.selected);
                    updateSelectedCount();
                };
                grid.appendChild(btn);
            });
            
            container.appendChild(grid);
        }

        // 全選択・全解除
        function selectAllProblems(select) {
            currentSessionData.forEach(p => p.selected = select);
            renderProblemGrid();
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const count = currentSessionData.filter(p => p.selected).length;
            document.getElementById('sel-count').innerText = count;
        }

        // クイズ開始
        function startSelectedQuestions() {
            selectedProblems = currentSessionData.filter(p => p.selected);
            if (selectedProblems.length === 0) {
                alert("問題を選択してください");
                return;
            }
            currentProblemIndex = 0;
            correctCount = 0;
            renderQuiz();
            switchView('view-quiz');
        }

        // クイズ画面の描画
        function renderQuiz() {
            const problem = selectedProblems[currentProblemIndex];
            
            // 進捗の更新
            document.getElementById('quiz-progress').innerText = `${currentProblemIndex + 1} / ${selectedProblems.length}`;
            document.getElementById('progress-bar').style.width = `${((currentProblemIndex) / selectedProblems.length) * 100}%`;
            
            // 問題文のセット
            const questionArea = document.getElementById('question-area');
            questionArea.innerHTML = `<div class="question-number-label">問 ${currentProblemIndex + 1}</div><br>${problem.text}`;

            // ドラッグ＆ドロップ用語群のセット
            const wordBankArea = document.getElementById('word-bank-area');
            const wordBank = document.getElementById('word-bank');
            wordBank.innerHTML = '';
            
            if (problem.type === "dragdrop" && problem.wordBank) {
                wordBankArea.style.display = 'flex';
                wordBankArea.style.flexDirection = 'column';
                problem.wordBank.forEach((word, idx) => {
                    const item = document.createElement('div');
                    item.className = 'draggable-item';
                    item.draggable = true;
                    item.id = `drag-${idx}`;
                    item.textContent = word;
                    item.ondragstart = dragStart;
                    wordBank.appendChild(item);
                });
            } else {
                wordBankArea.style.display = 'none';
            }

            document.getElementById('action-btn').innerText = "解答する";
            document.getElementById('action-btn').onclick = checkAnswer;
        }

        // ==========================================
        // ドラッグ＆ドロップ処理
        // ==========================================
        function dragStart(ev) {
            ev.dataTransfer.setData("text/plain", ev.target.id);
        }
        function allowDrop(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.add('drag-over');
        }
        function dragLeave(ev) {
            ev.currentTarget.classList.remove('drag-over');
        }
        // ドロップゾーン（空欄）へのドロップ
        function dropToZone(ev) {
            ev.preventDefault();
            const zone = ev.currentTarget;
            zone.classList.remove('drag-over');
            
            // 既にアイテムが入っている場合は語群に戻す
            if (zone.children.length > 0) {
                document.getElementById('word-bank').appendChild(zone.children[0]);
            }
            
            const data = ev.dataTransfer.getData("text/plain");
            const draggedElement = document.getElementById(data);
            if (draggedElement) {
                zone.appendChild(draggedElement);
            }
        }
        // 語群エリアへのドロップ（戻す時）
        function dropToBank(ev) {
            ev.preventDefault();
            ev.currentTarget.classList.remove('drag-over');
            const data = ev.dataTransfer.getData("text/plain");
            const draggedElement = document.getElementById(data);
            if (draggedElement) {
                ev.currentTarget.appendChild(draggedElement);
            }
        }

        // ==========================================
        // 正誤判定処理
        // ==========================================
        function checkAnswer() {
            const problem = selectedProblems[currentProblemIndex];
            let isCorrect = true;

            // タイピング形式の判定
            if (problem.type === "typing") {
                const inputs = document.querySelectorAll('.blank-input');
                inputs.forEach(input => {
                    const answer = input.getAttribute('data-answer');
                    // 入力値と解答を比較
                    if (input.value.trim() === answer) {
                        input.classList.add('correct');
                    } else {
                        input.classList.add('incorrect');
                        isCorrect = false;
                    }
                    input.readOnly = true; // 解答後は編集不可に
                });
            } 
            // ドラッグ＆ドロップ形式の判定
            else if (problem.type === "dragdrop") {
                const zones = document.querySelectorAll('.drop-zone');
                zones.forEach(zone => {
                    const answer = zone.getAttribute('data-answer');
                    const droppedItem = zone.querySelector('.draggable-item');
                    
                    // ドロップされた要素のテキストと解答を比較
                    if (droppedItem && droppedItem.textContent.trim() === answer) {
                        zone.classList.add('correct');
                    } else {
                        zone.classList.add('incorrect');
                        isCorrect = false;
                    }
                });
                
                // 解答後はドラッグ不可に
                document.querySelectorAll('.draggable-item').forEach(item => {
                    item.draggable = false;
                });
            }

            if (isCorrect) correctCount++;

            // 次の問題へ進むボタンに切り替え
            const btn = document.getElementById('action-btn');
            btn.innerText = "次の問題へ";
            btn.onclick = nextProblem;
        }

        function nextProblem() {
            currentProblemIndex++;
            if (currentProblemIndex < selectedProblems.length) {
                renderQuiz();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('final-score').innerText = `${correctCount}/${selectedProblems.length}`;
            switchView('view-result');
        }
    </script>
</body>
</html>
