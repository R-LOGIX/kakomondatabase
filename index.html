<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>過去問データベース | KAKOMON DATABASE</title>
    
    <script src="database1.js"></script>
    <script src="database2.js"></script>
    
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-card: rgba(30, 41, 59, 0.7);
            --neon-blue: #00f2fe;
            --neon-purple: #8b5cf6;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-yellow: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-glow: rgba(0, 242, 254, 0.3);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.1), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%; padding: 40px 20px 20px; text-align: center;
        }

        h1 {
            font-size: 2.5rem; font-weight: 800; letter-spacing: 3px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.4));
        }

        .subtitle { color: var(--text-muted); font-size: 1rem; letter-spacing: 2px; text-transform: uppercase; }

        main {
            width: 100%; max-width: 900px; padding: 20px;
            flex-grow: 1; display: flex; flex-direction: column;
        }

        .view-section {
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            padding: 30px;
        }

        /* メニュー */
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .menu-item { cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .menu-item:hover {
            transform: translateY(-5px); border-color: var(--neon-blue);
            box-shadow: 0 10px 30px var(--border-glow); background: rgba(15, 23, 42, 0.8);
        }
        .menu-title { font-size: 1.3rem; color: var(--neon-blue); margin-bottom: 10px; font-weight: bold; }
        .menu-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }

        /* 問題選択グリッド */
        .problem-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 15px; margin-top: 20px; max-height: 50vh; overflow-y: auto; padding-right: 10px;
        }
        .problem-item {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 15px 10px; border-radius: 8px;
            text-align: center; cursor: pointer; transition: all 0.2s; font-weight: bold; font-size: 1.1rem;
        }
        .problem-item:hover {
            background: rgba(0, 242, 254, 0.1); border-color: var(--neon-blue); transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2);
        }

        /* クイズ領域 */
        .quiz-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;
        }
        .question-text { font-size: 1.15rem; line-height: 1.9; margin-bottom: 30px; }

        /* 選択式関連 */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .seq-row { margin-bottom: 20px; border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 15px; }
        .seq-label { display: block; margin-bottom: 10px; color: var(--neon-blue); font-weight: bold; }
        .seq-btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .option-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main); padding: 14px 20px; border-radius: 12px;
            font-size: 1.05rem; text-align: left; cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: rgba(0, 242, 254, 0.1); border-color: var(--neon-blue); }
        .option-btn.selected { background: rgba(0, 242, 254, 0.2); border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }

        /* タイピング空欄補充 */
        .blank-input {
            background: rgba(0, 0, 0, 0.3); border: none; border-bottom: 2px solid var(--neon-purple);
            color: var(--text-main); font-size: 1.1rem; padding: 4px 8px; margin: 0 4px;
            width: 140px; text-align: center; border-radius: 4px 4px 0 0; outline: none; transition: all 0.3s;
        }
        .blank-input:focus { background: rgba(139, 92, 246, 0.2); border-bottom-color: var(--neon-blue); }
        .blank-input.correct { border-bottom-color: var(--neon-green); color: var(--neon-green); background: rgba(16, 185, 129, 0.1); }
        .blank-input.incorrect { border-bottom-color: var(--neon-red); color: var(--neon-red); background: rgba(239, 68, 68, 0.1); text-decoration: line-through; }
        .correct-answer-label { color: var(--neon-green); font-size: 0.9rem; font-weight: bold; margin-left: 5px; }

        /* ドラッグ＆ドロップ空欄補充 */
        .word-bank {
            display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px;
            padding: 20px; background: rgba(0, 0, 0, 0.2); border-radius: 12px;
            border: 1px dashed rgba(255,255,255,0.2); min-height: 80px;
            align-items: center; justify-content: center;
        }
        .draggable-item {
            background: linear-gradient(135deg, var(--neon-blue), #3b82f6);
            color: #000; font-weight: bold; padding: 8px 16px; border-radius: 20px;
            cursor: grab; user-select: none; font-size: 1rem;
            box-shadow: 0 4px 10px rgba(0, 242, 254, 0.2); transition: transform 0.1s;
            touch-action: none;
        }
        .draggable-item:active { cursor: grabbing; transform: scale(0.95); }
        .drop-zone {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 120px; height: 38px; border-bottom: 2px dashed var(--neon-purple);
            margin: 0 6px; vertical-align: bottom; transition: all 0.3s;
            border-radius: 4px 4px 0 0; background: rgba(0,0,0,0.3);
        }
        .drop-zone.drag-over { background: rgba(139, 92, 246, 0.3); border-bottom-color: var(--neon-blue); }
        .drop-zone .draggable-item { margin: 0; box-shadow: none; font-size: 0.95rem; padding: 4px 12px; }
        .drop-zone.correct { border-bottom-color: var(--neon-green) !important; background: rgba(16, 185, 129, 0.1); }
        .drop-zone.incorrect { border-bottom-color: var(--neon-red) !important; background: rgba(239, 68, 68, 0.1); }

        /* 論述問題（自己採点） */
        .essay-textarea {
            width: 100%; height: 180px; background: rgba(0,0,0,0.3);
            border: 1px solid var(--neon-purple); border-radius: 12px;
            color: var(--text-main); padding: 15px; font-size: 1.1rem;
            resize: vertical; outline: none; transition: border-color 0.3s;
            line-height: 1.6;
        }
        .essay-textarea:focus { border-color: var(--neon-blue); background: rgba(139, 92, 246, 0.05); }
        .self-grade-panel {
            margin-top: 20px; padding: 25px; background: rgba(255,255,255,0.03);
            border-radius: 12px; border-left: 4px solid var(--neon-blue);
            animation: fadeIn 0.4s; display: none;
        }
        .grade-btn-group { display: flex; gap: 15px; margin-top: 20px; }
        .grade-btn {
            flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 1.05rem;
            cursor: pointer; border: none; transition: all 0.2s; color: #000;
        }
        .grade-btn.g-correct { background: var(--neon-green); box-shadow: 0 0 15px rgba(16,185,129,0.3); }
        .grade-btn.g-partial { background: var(--neon-yellow); box-shadow: 0 0 15px rgba(245,158,11,0.3); }
        .grade-btn.g-incorrect { background: var(--neon-red); box-shadow: 0 0 15px rgba(239,68,68,0.3); }
        .grade-btn:hover { filter: brightness(1.15); transform: translateY(-2px); }

        /* ボタン類 */
        .controls { display: flex; gap: 15px; margin-top: 30px; }
        .btn {
            padding: 14px 24px; border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--neon-blue), #3b82f6); color: #000; flex-grow: 2; box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4); }
        .btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-primary:disabled { background: #334155; color: #94a3b8; box-shadow: none; cursor: not-allowed; transform: none; }
        .btn-secondary { background: transparent; color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.2); flex-grow: 1; }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.05); border-color: var(--text-main); }

        /* 結果画面 */
        .score-circle {
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--neon-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 40px auto; box-shadow: 0 0 30px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(0, 242, 254, 0.1);
        }
        .score-num { font-size: 3rem; font-weight: bold; color: var(--neon-blue); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body onload="initApp()">

    <header>
        <h1>過去問データベース</h1>
        <div class="subtitle">KAKOMON DATABASE</div>
    </header>

    <main>
        <section id="view-menu" class="view-section active">
            <div style="text-align: center; margin-bottom: 20px; color: var(--text-muted);">
                学習を開始するセッションを選択してください。
            </div>
            <div class="menu-grid" id="menu-container"></div>
        </section>

        <section id="view-problem-select" class="view-section">
            <div class="glass-card">
                <h2 id="problem-select-title" style="color: var(--neon-blue); margin-bottom: 10px; text-align: center;">セッション名</h2>
                <div style="text-align: center; margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem;">
                    解きたい問題を選択してください
                </div>
                <div class="problem-grid" id="problem-container"></div>
                <div class="controls">
                    <button class="btn btn-secondary" style="width: 100%;" onclick="returnToMenu()">← セッション選択に戻る</button>
                </div>
            </div>
        </section>

        <section id="view-quiz" class="view-section">
            <div class="glass-card">
                <div class="quiz-header">
                    <span id="quiz-title" style="color: var(--neon-blue); font-weight: bold; font-size: 1.2rem;"></span>
                    <span id="quiz-progress" style="color: var(--neon-purple); font-weight: bold;"></span>
                </div>
                
                <div id="word-bank-area" style="display: none;">
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;">語群 (ドラッグして空欄に配置してください)</div>
                    <div id="word-bank" class="word-bank" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></div>
                </div>

                <div id="question-area" class="question-text"></div>
                <div id="options-area" class="options-grid"></div>

                <div id="essay-sample-area" class="self-grade-panel">
                    <div style="color: var(--neon-green); font-weight: bold; margin-bottom: 10px;">■ 解答例・解説</div>
                    <div id="essay-sample-text" style="line-height: 1.8; font-size: 1.05rem; margin-bottom: 20px;"></div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                        <p style="color: var(--text-muted); font-size: 0.95rem;">自己採点を行ってください（スコアに加算されます）</p>
                        <div class="grade-btn-group">
                            <button class="grade-btn g-correct" onclick="submitSelfGrade(1, this)">〇 正解 (1点)</button>
                            <button class="grade-btn g-partial" onclick="submitSelfGrade(0.5, this)">△ 部分点 (0.5点)</button>
                            <button class="grade-btn g-incorrect" onclick="submitSelfGrade(0, this)">× 不正解 (0点)</button>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="returnToProblemSelect()">問題一覧に戻る</button>
                    <button class="btn btn-primary" id="action-btn" onclick="handleAction()">解答する</button>
                </div>
            </div>
        </section>

        <section id="view-result" class="view-section">
            <div class="glass-card" style="text-align: center;">
                <h2 style="font-size: 2rem; margin-bottom: 10px;">演習完了</h2>
                <p style="color: var(--text-muted);">あなたのスコア</p>
                <div class="score-circle">
                    <div class="score-num" id="final-score">0/0</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">獲得スコア</div>
                </div>
                <button class="btn btn-primary" style="width: 100%; max-width: 300px;" onclick="playSound('click'); returnToProblemSelect()">問題一覧へ戻る</button>
            </div>
        </section>
    </main>

    <script>
        const questionDatabase = [
            ...(typeof database1 !== 'undefined' ? database1 : []),
            ...(typeof database2 !== 'undefined' ? database2 : [])
        ];

        // --- オーディオシステム ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playTone(freq, type, duration, vol=0.1, delay=0) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + delay);
            osc.stop(audioCtx.currentTime + delay + duration);
        }
        function playSound(type) {
            initAudio();
            if(type === 'correct') {
                playTone(600, 'sine', 0.1, 0.1);
                playTone(800, 'sine', 0.2, 0.1, 0.1);
            } else if (type === 'incorrect') {
                playTone(300, 'sawtooth', 0.2, 0.1);
                playTone(250, 'sawtooth', 0.3, 0.1, 0.15);
            } else if (type === 'drop') {
                playTone(400, 'sine', 0.1, 0.05);
            } else if (type === 'click') {
                playTone(500, 'sine', 0.05, 0.05);
            }
        }

        // --- グローバル変数 ---
        let currentSession = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let isAnswerRevealed = false;
        let isWaitingForSelfGrade = false;
        
        let userSelectionSingle = null;
        let userSelectionMulti = [];
        let userSelectionSequence = {};

        // --- 画面遷移管理 ---
        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        function returnToMenu() {
            playSound('click');
            switchView('view-menu');
        }

        function returnToProblemSelect() {
            playSound('click');
            if(currentSession) switchView('view-problem-select');
            else returnToMenu();
        }

        // --- 初期化・問題選択 ---
        function initApp() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            questionDatabase.forEach((qSet, index) => {
                const qCount = (qSet.questions && Array.isArray(qSet.questions)) ? qSet.questions.length : 0;
                const card = document.createElement('div');
                card.className = 'glass-card menu-item';
                card.innerHTML = `
                    <div class="menu-title">${qSet.categoryName}</div>
                    <div class="menu-desc">${qSet.description}</div>
                    <div style="margin-top: 15px; color: var(--neon-purple); font-size: 0.85rem;">全 ${qCount} 問</div>
                `;
                card.onclick = () => {
                    playSound('click');
                    showProblemSelection(index);
                };
                container.appendChild(card);
            });
        }

        function showProblemSelection(dbIndex) {
            initAudio();
            currentSession = questionDatabase[dbIndex];
            score = 0; // スコアリセット
            
            document.getElementById('problem-select-title').innerText = currentSession.categoryName;
            
            const container = document.getElementById('problem-container');
            container.innerHTML = '';
            
            currentSession.questions.forEach((q, idx) => {
                const btn = document.createElement('div');
                btn.className = 'problem-item';
                btn.innerText = `第 ${idx + 1} 問`;
                btn.onclick = () => {
                    playSound('click');
                    startSpecificQuestion(idx);
                };
                container.appendChild(btn);
            });
            
            switchView('view-problem-select');
        }

        function startSpecificQuestion(idx) {
            currentQuestionIndex = idx;
            renderQuestion();
            switchView('view-quiz');
        }

        // --- 問題描画 ---
        function renderQuestion() {
            const q = currentSession.questions[currentQuestionIndex];
            isAnswerRevealed = false;
            isWaitingForSelfGrade = false;
            userSelectionSingle = null;
            userSelectionMulti = [];
            userSelectionSequence = {};

            document.getElementById('quiz-title').innerText = q.title || `第 ${currentQuestionIndex + 1} 問`;
            document.getElementById('quiz-progress').innerText = `${currentQuestionIndex + 1} / ${currentSession.questions.length}`;
            
            const qArea = document.getElementById('question-area');
            const oArea = document.getElementById('options-area');
            const wArea = document.getElementById('word-bank-area');
            const wBank = document.getElementById('word-bank');
            const eArea = document.getElementById('essay-sample-area');
            const actionBtn = document.getElementById('action-btn');
            
            oArea.innerHTML = '';
            wBank.innerHTML = '';
            wArea.style.display = 'none';
            eArea.style.display = 'none';
            actionBtn.style.display = 'block';
            actionBtn.innerText = '解答する';
            
            if (q.type === 'single' || q.type === 'multi' || q.type === 'sequence') {
                qArea.innerHTML = q.text.replace(/\n/g, '<br>');
                actionBtn.disabled = true;
            } 
            else if (q.type === 'fill') {
                let formattedText = q.html.replace(/\[\[([0-9a-zA-Zア-ン]+)\]\]/g, (match, p1) => {
                    return `<input type="text" class="blank-input" data-id="${p1}" placeholder="空欄 ${p1}" autocomplete="off">`;
                });
                qArea.innerHTML = formattedText;
                actionBtn.disabled = false;
            }
            else if (q.type === 'drag-fill') {
                wArea.style.display = 'block';
                let formattedText = q.html.replace(/\[\[([0-9a-zA-Zア-ン]+)\]\]/g, (match, p1) => {
                    return `<span class="drop-zone" data-id="${p1}" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></span>`;
                });
                qArea.innerHTML = formattedText;
                
                let words = [...q.wordBank].sort(() => Math.random() - 0.5);
                words.forEach((word, idx) => {
                    const div = document.createElement('div');
                    div.className = 'draggable-item';
                    div.draggable = true;
                    div.id = `drag-item-${idx}`;
                    div.dataset.val = word;
                    div.innerText = word;
                    div.addEventListener('dragstart', drag);
                    div.addEventListener('touchstart', handleTouchStart, {passive: false});
                    div.addEventListener('touchmove', handleTouchMove, {passive: false});
                    div.addEventListener('touchend', handleTouchEnd);
                    wBank.appendChild(div);
                });
                actionBtn.disabled = true;
            }
            else if (q.type === 'essay') {
                qArea.innerHTML = q.text.replace(/\n/g, '<br>') + 
                    `<textarea class="essay-textarea" placeholder="ここに解答を記述してください..."></textarea>`;
                actionBtn.innerText = '解答例を確認する';
                actionBtn.disabled = false;
            }

            // 選択肢の生成
            if (q.type === 'single') {
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => {
                        if(isAnswerRevealed) return;
                        playSound('click');
                        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        userSelectionSingle = opt.id;
                        actionBtn.disabled = false;
                    };
                    oArea.appendChild(btn);
                });
            } else if (q.type === 'multi') {
                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt.text;
                    btn.onclick = () => {
                        if(isAnswerRevealed) return;
                        playSound('click');
                        if(userSelectionMulti.includes(opt.id)) {
                            userSelectionMulti = userSelectionMulti.filter(id => id !== opt.id);
                            btn.classList.remove('selected');
                        } else {
                            if(userSelectionMulti.length < q.req) {
                                userSelectionMulti.push(opt.id);
                                btn.classList.add('selected');
                            }
                        }
                        actionBtn.disabled = (userSelectionMulti.length !== q.req);
                    };
                    oArea.appendChild(btn);
                });
            } else if (q.type === 'sequence') {
                q.parts.forEach((part, pIdx) => {
                    const row = document.createElement('div');
                    row.className = 'seq-row';
                    row.innerHTML = `<span class="seq-label">${part.label}</span>`;
                    const grp = document.createElement('div');
                    grp.className = 'seq-btn-group';
                    part.options.forEach(opt => {
                        const btn = document.createElement('button');
                        btn.className = 'option-btn';
                        btn.style.flex = '1';
                        btn.style.textAlign = 'center';
                        btn.innerText = opt.text;
                        btn.onclick = () => {
                            if(isAnswerRevealed) return;
                            playSound('click');
                            grp.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                            btn.classList.add('selected');
                            userSelectionSequence[pIdx] = opt.id;
                            actionBtn.disabled = Object.keys(userSelectionSequence).length !== q.parts.length;
                        };
                        grp.appendChild(btn);
                    });
                    row.appendChild(grp);
                    oArea.appendChild(row);
                });
            }
        }

        // --- ドラッグ＆ドロップ処理 ---
        function allowDrop(ev) {
            ev.preventDefault();
            if(ev.target.classList.contains('drop-zone')) ev.target.classList.add('drag-over');
        }
        function dragLeave(ev) {
            if(ev.target.classList.contains('drop-zone')) ev.target.classList.remove('drag-over');
        }
        function drag(ev) {
            if (isAnswerRevealed) return; 
            ev.dataTransfer.setData("text", ev.target.id);
        }
        function drop(ev) {
            ev.preventDefault();
            if (isAnswerRevealed) return;
            let target = ev.target;
            if (target.classList.contains('drag-over')) target.classList.remove('drag-over');
            if (target.classList.contains('draggable-item')) target = target.parentNode;

            var data = ev.dataTransfer.getData("text");
            var draggedEl = document.getElementById(data);
            if (!draggedEl) return;

            if (target.classList.contains('drop-zone')) {
                if (target.hasChildNodes()) document.getElementById('word-bank').appendChild(target.firstChild);
                target.appendChild(draggedEl);
                playSound('drop');
            } else if (target.id === 'word-bank' || target.classList.contains('word-bank')) {
                document.getElementById('word-bank').appendChild(draggedEl);
                playSound('drop');
            }
            checkDragSubmit();
        }

        // --- スマホ（タッチ）用 ドラッグ＆ドロップ処理 ---
        let dragGhost = null;
        let activeDragEl = null;
        let touchOffsetX = 0, touchOffsetY = 0;

        function handleTouchStart(e) {
            if (isAnswerRevealed) return;
            activeDragEl = e.target;
            const touch = e.touches[0];
            const rect = activeDragEl.getBoundingClientRect();
            
            dragGhost = activeDragEl.cloneNode(true);
            dragGhost.style.position = 'fixed';
            dragGhost.style.left = rect.left + 'px';
            dragGhost.style.top = rect.top + 'px';
            dragGhost.style.width = rect.width + 'px';
            dragGhost.style.height = rect.height + 'px';
            dragGhost.style.opacity = '0.8';
            dragGhost.style.zIndex = '9999';
            dragGhost.style.pointerEvents = 'none';
            dragGhost.style.margin = '0';
            document.body.appendChild(dragGhost);
            
            activeDragEl.style.opacity = '0.3'; 
            
            touchOffsetX = touch.clientX - rect.left;
            touchOffsetY = touch.clientY - rect.top;
            playSound('click');
        }

        function handleTouchMove(e) {
            if (!dragGhost) return;
            e.preventDefault();
            const touch = e.touches[0];
            dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
            dragGhost.style.top = (touch.clientY - touchOffsetY) + 'px';
            
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
            if(target && target.classList.contains('drop-zone')) {
                target.classList.add('drag-over');
            }
        }

        function handleTouchEnd(e) {
            if (!dragGhost || !activeDragEl) return;
            const touch = e.changedTouches[0];
            
            dragGhost.remove();
            dragGhost = null;
            activeDragEl.style.opacity = '1';
            
            const target = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));

            if (target) {
                let dropTarget = target;
                if (dropTarget.classList.contains('draggable-item')) dropTarget = dropTarget.parentNode;
                
                if (dropTarget.classList.contains('drop-zone')) {
                    if (dropTarget.hasChildNodes()) document.getElementById('word-bank').appendChild(dropTarget.firstChild);
                    dropTarget.appendChild(activeDragEl);
                    playSound('drop');
                } else if (dropTarget.id === 'word-bank' || dropTarget.closest('.word-bank') || dropTarget.closest('#word-bank-area')) {
                    document.getElementById('word-bank').appendChild(activeDragEl);
                    playSound('drop');
                }
            }
            activeDragEl = null;
            checkDragSubmit();
        }

        function checkDragSubmit() {
            if(currentSession.questions[currentQuestionIndex].type !== 'drag-fill') return;
            const blanks = document.querySelectorAll('.drop-zone');
            let allFilled = true;
            blanks.forEach(b => { if(!b.hasChildNodes()) allFilled = false; });
            document.getElementById('action-btn').disabled = !allFilled;
        }

        // --- 解答・採点処理 ---
        function handleAction() {
            if (isWaitingForSelfGrade) return; 
            playSound('click');

            if (!isAnswerRevealed) {
                checkAnswer();
            } else {
                currentQuestionIndex++;
                if (currentQuestionIndex < currentSession.questions.length) {
                    renderQuestion();
                } else {
                    document.getElementById('final-score').innerText = `${score} / ${currentSession.questions.length}`;
                    switchView('view-result');
                }
            }
        }

        function submitSelfGrade(points, btn) {
            score += points;
            isWaitingForSelfGrade = false;
            isAnswerRevealed = true;
            
            document.querySelectorAll('.grade-btn').forEach(b => b.style.opacity = '0.4');
            btn.style.opacity = '1';
            btn.style.transform = 'scale(1.05)';
            
            const actionBtn = document.getElementById('action-btn');
            actionBtn.style.display = 'block';
            actionBtn.innerText = '次の問題へ';
            playSound('click');
        }

        function checkAnswer() {
            const q = currentSession.questions[currentQuestionIndex];
            const actionBtn = document.getElementById('action-btn');

            if (q.type === 'essay') {
                isWaitingForSelfGrade = true;
                actionBtn.style.display = 'none';
                document.getElementById('essay-sample-text').innerHTML = q.sampleAnswer.replace(/\n/g, '<br>');
                document.getElementById('essay-sample-area').style.display = 'block';
                document.querySelector('.essay-textarea').readOnly = true;
                return; 
            }

            isAnswerRevealed = true;
            actionBtn.innerText = '次の問題へ';
            
            let isCorrectGlobal = true; // 総合判定

            if (q.type === 'single') {
                isCorrectGlobal = (userSelectionSingle === q.answer);
                if (isCorrectGlobal) score++;
                document.querySelectorAll('.option-btn').forEach(btn => {
                    const optId = q.options.find(o => o.text === btn.innerText).id;
                    if (optId === q.answer) {
                        btn.style.borderColor = 'var(--neon-green)';
                        btn.style.background = 'rgba(16, 185, 129, 0.2)';
                        btn.innerHTML += ' <span style="float:right; color:var(--neon-green);">✓ 正解</span>';
                    } else if (optId === userSelectionSingle && !isCorrectGlobal) {
                        btn.style.borderColor = 'var(--neon-red)';
                        btn.style.background = 'rgba(239, 68, 68, 0.2)';
                    }
                });
            } 
            else if (q.type === 'multi') {
                isCorrectGlobal = q.answer.every(ans => userSelectionMulti.includes(ans)) && q.answer.length === userSelectionMulti.length;
                if (isCorrectGlobal) score++;
                document.querySelectorAll('.option-btn').forEach(btn => {
                    const optId = q.options.find(o => o.text === btn.innerText).id;
                    if (q.answer.includes(optId)) {
                        btn.style.borderColor = 'var(--neon-green)';
                        btn.style.background = 'rgba(16, 185, 129, 0.2)';
                        btn.innerHTML += ' <span style="float:right; color:var(--neon-green);">✓</span>';
                    } else if (userSelectionMulti.includes(optId) && !q.answer.includes(optId)) {
                        btn.style.borderColor = 'var(--neon-red)';
                        btn.style.background = 'rgba(239, 68, 68, 0.2)';
                    }
                });
            }
            else if (q.type === 'sequence') {
                let allCorrect = true;
                document.querySelectorAll('.seq-row').forEach((row, idx) => {
                    const correctAnswer = q.parts[idx].answer;
                    const userAnswer = userSelectionSequence[idx];
                    if (userAnswer !== correctAnswer) allCorrect = false;
                    
                    row.querySelectorAll('.option-btn').forEach(btn => {
                        const optText = btn.innerText.replace(' ✓', ''); // ゴミ除去
                        const optObj = q.parts[idx].options.find(o => o.text === optText);
                        if(optObj && optObj.id === correctAnswer) {
                            btn.style.borderColor = 'var(--neon-green)';
                            btn.style.background = 'rgba(16, 185, 129, 0.2)';
                            btn.innerHTML += ' <span style="color:var(--neon-green);">✓</span>';
                        } else if (optObj && optObj.id === userAnswer && userAnswer !== correctAnswer) {
                            btn.style.borderColor = 'var(--neon-red)';
                            btn.style.background = 'rgba(239, 68, 68, 0.2)';
                        }
                    });
                });
                isCorrectGlobal = allCorrect;
                if(isCorrectGlobal) score++;
            }
            else if (q.type === 'fill') {
                let allCorrect = true;
                document.querySelectorAll('.blank-input').forEach(input => {
                    const id = input.dataset.id;
                    const val = input.value.trim();
                    const correctAnswer = q.answers[id];
                    if(val === correctAnswer) {
                        input.classList.add('correct');
                    } else {
                        input.classList.add('incorrect');
                        allCorrect = false;
                        const label = document.createElement('span');
                        label.className = 'correct-answer-label';
                        label.innerText = `(${correctAnswer})`;
                        input.parentNode.insertBefore(label, input.nextSibling);
                    }
                    input.readOnly = true;
                });
                isCorrectGlobal = allCorrect;
                if(isCorrectGlobal) score++;
            }
            else if (q.type === 'drag-fill') {
                let allCorrect = true;
                document.querySelectorAll('.drop-zone').forEach(zone => {
                    const id = zone.dataset.id;
                    const correctAnswer = q.answers[id];
                    const item = zone.firstChild;
                    const val = item ? item.dataset.val : null;
                    
                    if(val === correctAnswer) {
                        zone.classList.add('correct');
                    } else {
                        zone.classList.add('incorrect');
                        allCorrect = false;
                        const label = document.createElement('span');
                        label.className = 'correct-answer-label';
                        label.innerText = `(${correctAnswer})`;
                        zone.parentNode.insertBefore(label, zone.nextSibling);
                    }
                    if(item) item.draggable = false;
                });
                isCorrectGlobal = allCorrect;
                if(isCorrectGlobal) score++;
            }

            if(isCorrectGlobal) playSound('correct');
            else playSound('incorrect');
        }
    </script>
</body>
</html>
