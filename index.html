<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>過去問データベース | KAKOMON DATABASE</title>
    
    <script src="database1.js"></script>
    <script src="database2.js"></script>
    
    <style>
        :root {
            --bg-base: #f1f5f9;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --neon-blue: #4f46e5;
            --neon-purple: #6366f1;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --neon-yellow: #f59e0b;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-glow: rgba(79, 70, 229, 0.2);
            --border-base: #e2e8f0;
            --border-hover: #cbd5e1;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Hiragino Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%; padding: 24px 20px 20px; text-align: center;
            background: white; border-bottom: 2px solid var(--border-base);
            box-shadow: var(--shadow-sm);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.8rem; font-weight: 800; letter-spacing: 1px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .subtitle { color: var(--text-muted); font-size: 0.9rem; letter-spacing: 1px; font-weight: bold; text-transform: uppercase; }

        main {
            width: 100%; max-width: 1024px; padding: 20px;
            flex-grow: 1; display: flex; flex-direction: column;
        }

        .view-section {
            display: none; opacity: 0; transform: translateY(20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }

        .glass-card {
            background: var(--bg-card);
            border: 2px solid var(--border-base);
            border-radius: 24px; box-shadow: var(--shadow-sm);
            padding: 30px;
        }

        /* ===== メニュー ===== */
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }
        .menu-item { 
            cursor: pointer; transition: all 0.2s ease; position: relative; overflow: hidden; 
            border: 2px solid var(--border-base); background: var(--bg-surface);
            border-radius: 16px; padding: 20px;
        }
        .menu-item:hover {
            transform: translateY(-4px); border-color: var(--neon-blue);
            box-shadow: var(--shadow-md);
        }
        .menu-title { font-size: 1.2rem; color: var(--text-main); margin-bottom: 10px; font-weight: bold; }
        .menu-desc { font-size: 0.95rem; color: var(--text-muted); line-height: 1.5; }
        .menu-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .menu-count { color: var(--neon-blue); font-size: 0.85rem; font-weight: bold; background: rgba(79,70,229,0.1); padding: 4px 10px; border-radius: 8px; }

        /* 前回スコアバッジ */
        .last-score-badge {
            font-size: 0.8rem; font-weight: bold; padding: 4px 10px;
            border-radius: 20px; background: rgba(0,0,0,0.05);
            border: 1px solid var(--border-base);
        }
        .last-score-badge.perfect { color: var(--neon-green); border-color: var(--neon-green); background: rgba(16,185,129,0.1); }
        .last-score-badge.good    { color: var(--neon-blue);  border-color: var(--neon-blue); background: rgba(79,70,229,0.1); }
        .last-score-badge.fair    { color: var(--neon-yellow);border-color: var(--neon-yellow); background: rgba(245,158,11,0.1); }
        .last-score-badge.poor    { color: var(--neon-red);   border-color: var(--neon-red); background: rgba(239,68,68,0.1); }

        /* ===== 問題選択 ===== */
        .problem-select-controls {
            display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;
        }
        .problem-select-controls .btn { flex: 1; min-width: 140px; font-size: 0.9rem; padding: 10px 16px; }

        /* 設定パネル */
        .settings-panel {
            background: #f8fafc;
            border: 2px solid var(--border-base);
            border-radius: 16px;
            padding: 14px 18px;
            margin-bottom: 16px;
            display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
        }
        .settings-panel .settings-title {
            font-size: 0.85rem; color: var(--text-main); font-weight: bold; margin-right: 4px; white-space: nowrap;
        }
        .toggle-switch-wrap {
            display: flex; align-items: center; gap: 8px; cursor: pointer;
            user-select: none;
        }
        .toggle-switch-wrap .ts-label {
            font-size: 0.88rem; color: var(--text-muted); font-weight: bold; white-space: nowrap;
        }
        .toggle-switch {
            position: relative; width: 42px; height: 24px;
            background: var(--border-hover);
            border-radius: 99px; border: 2px solid transparent;
            transition: all 0.25s;
            flex-shrink: 0;
        }
        .toggle-switch::after {
            content: ''; position: absolute; top: 2px; left: 2px;
            width: 16px; height: 16px; border-radius: 50%;
            background: white; box-shadow: var(--shadow-sm);
            transition: all 0.25s;
        }
        .toggle-switch-wrap.on .toggle-switch {
            background: var(--neon-blue);
        }
        .toggle-switch-wrap.on .toggle-switch::after {
            transform: translateX(18px);
        }
        .settings-divider {
            width: 2px; height: 24px;
            background: var(--border-base);
        }

        .problem-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 12px; margin-top: 10px; margin-bottom: 10px;
        }

        /* 問題ボタン */
        .problem-item {
            background: var(--bg-surface); border: 2px solid var(--border-base);
            color: var(--text-main); padding: 12px 10px; border-radius: 12px;
            text-align: center; cursor: pointer; transition: all 0.2s; font-weight: bold;
            font-size: 0.9rem; line-height: 1.3;
            position: relative; min-height: 56px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .problem-item:hover {
            background: #f8fafc; border-color: var(--neon-blue); transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .problem-item.selected {
            background: rgba(79,70,229,0.05); border-color: var(--neon-blue);
        }
        /* 正誤マーク */
        .problem-item .result-mark {
            position: absolute; top: -8px; right: -8px;
            width: 22px; height: 22px; border-radius: 50%;
            font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
            border: 2px solid white; box-shadow: var(--shadow-sm);
        }
        .result-mark.mark-correct   { background: var(--neon-green); color: white; }
        .result-mark.mark-partial   { background: var(--neon-yellow); color: white; }
        .result-mark.mark-incorrect { background: var(--neon-red);   color: white; }
        .problem-item.answered-correct   { border-color: rgba(16,185,129,0.5); }
        .problem-item.answered-partial   { border-color: rgba(245,158,11,0.5); }
        .problem-item.answered-incorrect { border-color: rgba(239,68,68,0.5); }

        /* 選択済みスタート */
        .start-selected-bar {
            margin-top: 20px; padding: 16px 20px;
            background: #f8fafc;
            border: 2px solid var(--border-base);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            flex-wrap: wrap;
        }
        .start-selected-bar .sel-info { font-size: 0.95rem; color: var(--text-muted); font-weight: bold; }
        .start-selected-bar .sel-info span { color: var(--neon-blue); font-size: 1.1rem; }

        /* ===== 進捗バー ===== */
        .progress-bar-wrap {
            width: 100%; background: var(--border-base); border-radius: 99px;
            height: 8px; margin-bottom: 20px; overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%; border-radius: 99px;
            background: var(--neon-blue);
            transition: width 0.5s ease;
        }

        /* ===== クイズ領域 ===== */
        .quiz-header {
            display: flex; justify-content: flex-end; align-items: center;
            margin-bottom: 10px;
        }
        .quiz-progress-text { color: var(--text-muted); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        .question-number-label {
            display: inline-block;
            background: rgba(79,70,229,0.1);
            border: none;
            border-radius: 8px;
            padding: 4px 12px;
            color: var(--neon-blue);
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .question-text { font-size: 1.25rem; line-height: 1.7; margin-bottom: 30px; font-weight: bold; color: var(--text-main); }

        /* モード切り替えタブ */
        .mode-tabs { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .mode-tab {
            padding: 8px 16px; border-radius: 12px; font-size: 0.85rem; font-weight: bold;
            cursor: pointer; border: 2px solid var(--border-base);
            background: var(--bg-surface); color: var(--text-muted); transition: all 0.2s;
        }
        .mode-tab:hover { border-color: var(--border-hover); color: var(--text-main); }
        .mode-tab.active { background: rgba(79,70,229,0.1); border-color: var(--neon-blue); color: var(--neon-blue); }

        /* ===== 選択式 ===== */
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .seq-row { margin-bottom: 20px; border-bottom: 2px dashed var(--border-base); padding-bottom: 15px; }
        .seq-label { display: block; margin-bottom: 10px; color: var(--text-main); font-weight: bold; }
        .seq-btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

        .option-btn {
            background: white; border: 2px solid var(--border-base);
            color: var(--text-main); padding: 14px 20px; border-radius: 16px;
            font-size: 1.05rem; text-align: left; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px; font-weight: bold;
        }
        .option-btn:hover { background: #f8fafc; border-color: var(--neon-blue); }
        .option-btn.selected { background: rgba(79,70,229,0.05); border-color: var(--neon-blue); box-shadow: var(--shadow-sm); }
        
        .shortcut-badge {
            min-width: 28px; height: 28px; border-radius: 8px;
            background: var(--bg-base); border: 2px solid var(--border-base);
            font-size: 0.8rem; font-weight: bold; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); flex-shrink: 0;
        }

        /* ===== タイピング空欄補充 ===== */
        .blank-wrap {
            position: relative; display: inline-block; margin: 0 4px; vertical-align: bottom;
        }
        .blank-num-hint {
            position: absolute; top: -1.3em; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: var(--neon-purple);
            font-weight: bold; pointer-events: none; white-space: nowrap; line-height: 1;
        }
        .blank-input {
            background: #f8fafc; border: 2px solid var(--border-base);
            border-radius: 8px; padding: 4px 12px; font-size: 1.1rem; color: var(--neon-blue); font-weight: bold;
            width: auto; min-width: 120px; text-align: center; transition: all 0.2s;
            display: inline-block; margin: 0; outline: none;
        }
        .blank-input:focus { border-color: var(--neon-blue); background: white; box-shadow: var(--shadow-md); }
        .blank-input.correct { border-color: var(--neon-green) !important; color: var(--neon-green) !important; background: rgba(16, 185, 129, 0.1) !important; }
        .blank-input.incorrect { border-color: var(--neon-red) !important; color: var(--neon-red) !important; background: rgba(239, 68, 68, 0.1) !important; text-decoration: line-through; }
        .correct-answer-label { color: var(--neon-green); font-size: 0.95rem; font-weight: bold; margin-left: 8px; }

        /* ===== ドラッグ＆ドロップ空欄補充 ===== */
        .word-bank {
            display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px;
            padding: 24px; background: #f8fafc; border-radius: 16px;
            border: 2px dashed var(--border-base); min-height: 80px;
            align-items: center; justify-content: center;
        }
        .draggable-item {
            background: white;
            color: var(--text-main); font-weight: bold; padding: 10px 20px; border-radius: 12px;
            cursor: grab; user-select: none; font-size: 1.05rem; 
            border: 2px solid var(--text-main);
            box-shadow: 4px 4px 0px 0px rgb(15 23 42); transition: transform 0.1s;
            touch-action: none;
        }
        .draggable-item:active { cursor: grabbing; transform: translate(2px, 2px); box-shadow: none; }
        
        .drop-zone-wrap {
            position: relative; display: inline-block; margin: 0 6px; vertical-align: bottom;
        }
        .drop-zone-num-hint {
            position: absolute; top: -1.3em; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: var(--neon-purple);
            font-weight: bold; pointer-events: none; white-space: nowrap; line-height: 1;
        }
        .drop-zone {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 120px; height: 44px; border: 2px dashed var(--border-hover);
            border-radius: 10px; background: #f8fafc; transition: all 0.2s;
            margin: 0; padding: 0 10px; vertical-align: middle;
        }
        .drop-zone.drag-over { border-color: var(--neon-blue); background: rgba(79,70,229,0.1); }
        
        /* Drop Zone内のドラッグアイテムのモダンスタイル（インラインテキスト風に配置） */
        .drop-zone .draggable-item { 
            background: transparent; color: var(--neon-blue); box-shadow: none; border: none;
            padding: 0; margin: 0; font-size: 1.2rem; font-weight: bold; cursor: grab;
        }
        .drop-zone.correct { background: rgba(16, 185, 129, 0.1); border: 2px solid var(--neon-green) !important; color: var(--neon-green); }
        .drop-zone.incorrect { background: rgba(239, 68, 68, 0.1); border: 2px solid var(--neon-red) !important; color: var(--neon-red); text-decoration: line-through; }
        .drop-zone.correct .draggable-item { color: var(--neon-green); }
        .drop-zone.incorrect .draggable-item { color: var(--neon-red); }

        /* ===== 解説パネル ===== */
        .explanation-panel {
            margin-top: 24px; padding: 24px;
            background: #f8fafc;
            border-radius: 16px; border: 2px solid var(--border-base);
            border-left: 6px solid var(--neon-blue);
            animation: fadeIn 0.4s; display: none;
        }
        .explanation-panel .exp-title {
            color: var(--neon-blue); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
        }
        .explanation-panel .exp-body { color: var(--text-main); font-size: 1.05rem; line-height: 1.8; }

        /* ===== 論述問題 ===== */
        .essay-textarea {
            width: 100%; height: 180px; background: #f8fafc;
            border: 2px solid var(--border-base); border-radius: 16px;
            color: var(--text-main); padding: 16px; font-size: 1.1rem;
            resize: vertical; outline: none; transition: border-color 0.2s;
            line-height: 1.6;
        }
        .essay-textarea:focus { border-color: var(--neon-blue); background: white; box-shadow: var(--shadow-sm); }
        .self-grade-panel {
            margin-top: 24px; padding: 24px; background: white;
            border-radius: 16px; border: 2px solid var(--border-base);
            border-left: 6px solid var(--neon-blue);
            animation: fadeIn 0.4s; display: none; box-shadow: var(--shadow-sm);
        }
        .grade-btn-group { display: flex; gap: 12px; margin-top: 20px; }
        .grade-btn {
            flex: 1; padding: 14px; border-radius: 12px; font-weight: bold; font-size: 1rem;
            cursor: pointer; border: none; transition: transform 0.2s; color: white;
            box-shadow: var(--shadow-sm);
        }
        .grade-btn.g-correct  { background: var(--neon-green); }
        .grade-btn.g-partial  { background: var(--neon-yellow); }
        .grade-btn.g-incorrect{ background: var(--neon-red); }
        .grade-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); filter: brightness(1.05); }

        /* ===== ボタン類 ===== */
        .controls { display: flex; gap: 16px; margin-top: 32px; flex-wrap: wrap; }
        .btn {
            padding: 14px 24px; border: none; border-radius: 12px;
            font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: all 0.2s ease; letter-spacing: 0.5px;
        }
        .btn-primary { background: var(--text-main); color: white; flex-grow: 2; box-shadow: var(--shadow-sm); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .btn-primary:disabled { background: var(--border-base); color: var(--text-muted); cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-secondary { background: white; color: var(--text-main); border: 2px solid var(--border-base); flex-grow: 1; }
        .btn-secondary:hover { background: #f8fafc; border-color: var(--border-hover); }

        .keyboard-hint {
            text-align: center; color: var(--text-muted); font-size: 0.8rem; font-weight: bold;
            margin-top: 16px; opacity: 0.8;
        }
        .keyboard-hint kbd {
            background: white; border: 2px solid var(--border-base);
            border-radius: 6px; padding: 2px 8px; font-size: 0.75rem; font-family: monospace;
            box-shadow: 0 2px 0 0 var(--border-base);
        }

        /* ===== 結果画面 ===== */
        .score-circle {
            width: 160px; height: 160px; border-radius: 50%; border: 6px solid var(--neon-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 30px auto; background: white; box-shadow: var(--shadow-md);
        }
        .score-num { font-size: 2.8rem; font-weight: 900; color: var(--text-main); }

        .result-detail-wrap {
            margin-top: 24px; max-height: 40vh; overflow-y: auto;
            border: 2px solid var(--border-base); border-radius: 16px; background: white;
            box-shadow: var(--shadow-sm);
        }
        .result-detail-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; text-align: left; }
        .result-detail-table th {
            position: sticky; top: 0; background: #f8fafc;
            padding: 14px 16px; color: var(--text-muted); font-weight: bold;
            border-bottom: 2px solid var(--border-base); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;
        }
        .result-detail-table td {
            padding: 12px 16px; border-bottom: 1px solid var(--border-base);
            vertical-align: middle; color: var(--text-main); font-weight: 500;
        }
        .result-detail-table tr:last-child td { border-bottom: none; }
        .result-detail-table tr:hover td { background: #f8fafc; }
        .result-mark-cell { text-align: center; }
        .mark-icon { font-size: 1.2rem; font-weight: bold; }
        .mark-icon.ci  { color: var(--neon-green); }
        .mark-icon.cp  { color: var(--neon-yellow); }
        .mark-icon.cx  { color: var(--neon-red); }

        .result-summary-bar {
            display: flex; gap: 30px; justify-content: center; flex-wrap: wrap;
            margin-bottom: 24px; background: #f8fafc; padding: 20px; border-radius: 16px; border: 2px solid var(--border-base);
        }
        .result-stat { text-align: center; }
        .result-stat .stat-num { font-size: 2.2rem; font-weight: 900; }
        .result-stat .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .result-stat.s-correct  .stat-num { color: var(--neon-green); }
        .result-stat.s-partial  .stat-num { color: var(--neon-yellow); }
        .result-stat.s-incorrect.stat-num { color: var(--neon-red); }

        .score-message { font-size: 1.3rem; font-weight: 800; margin: 10px 0 20px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 99px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn {
            0%   { transform: scale(0.7); opacity: 0; }
            70%  { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-in { animation: popIn 0.4s cubic-bezier(0.4,0,0.2,1); }
    </style>
</head>
<body onload="initApp()">

    <header>
        <h1>過去問データベース</h1>
        <div class="subtitle">KAKOMON DATABASE</div>
    </header>

    <main>
        <!-- ===== メニュー ===== -->
        <section id="view-menu" class="view-section active">
            <div style="text-align: center; margin-bottom: 20px; color: var(--text-muted);">
                学習を開始するセッションを選択してください。
            </div>
            <div class="menu-grid" id="menu-container"></div>
        </section>

        <!-- ===== 問題選択 ===== -->
        <section id="view-problem-select" class="view-section">
            <div class="glass-card">
                <h2 id="problem-select-title" style="color: var(--neon-blue); margin-bottom: 6px; text-align: center;"></h2>
                <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 16px;">解きたい問題を選択してください</p>

                <!-- 設定パネル -->
                <div class="settings-panel">
                    <span class="settings-title">⚙ 出題設定</span>
                    <div class="toggle-switch-wrap" id="toggle-random-order" onclick="toggleSetting('randomOrder')">
                        <div class="toggle-switch"></div>
                        <span class="ts-label">🔀 問題ランダム</span>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="toggle-switch-wrap" id="toggle-random-options" onclick="toggleSetting('randomOptions')">
                        <div class="toggle-switch"></div>
                        <span class="ts-label">🃏 選択肢ランダム</span>
                    </div>
                    <div class="settings-divider"></div>
                    <div class="toggle-switch-wrap" id="toggle-random-words" onclick="toggleSetting('randomWords')">
                        <div class="toggle-switch"></div>
                        <span class="ts-label">🎴 語群ランダム</span>
                    </div>
                </div>

                <!-- モードタブ -->
                <div class="mode-tabs">
                    <button class="mode-tab active" id="tab-all" onclick="switchProblemTab('all')">すべて</button>
                    <button class="mode-tab" id="tab-wrong" onclick="switchProblemTab('wrong')">✗ 不正解のみ</button>
                    <button class="mode-tab" id="tab-unanswered" onclick="switchProblemTab('unanswered')">未回答のみ</button>
                </div>

                <!-- 一括操作ボタン -->
                <div class="problem-select-controls">
                    <button class="btn btn-secondary" onclick="selectAllQuestions(true)">☑ 全問題選択</button>
                    <button class="btn btn-secondary" onclick="selectAllQuestions(false)">☐ 全問題解除</button>
                </div>

                <!-- フラットな問題グリッド -->
                <div id="problem-container"></div>

                <!-- 選択中の問題数 & 開始バー -->
                <div class="start-selected-bar" id="start-selected-bar">
                    <div class="sel-info">選択中: <span id="sel-count">0</span> 問</div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn btn-secondary" style="padding:10px 18px; font-size:0.9rem;" onclick="startSelectedQuestions()">▶ 選択問題を解く</button>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" style="width: 100%;" onclick="returnToMenu()">← セッション選択に戻る</button>
                </div>
            </div>
        </section>

        <!-- ===== クイズ ===== -->
        <section id="view-quiz" class="view-section">
            <div class="glass-card">
                <!-- 進捗バー -->
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progress-bar" style="width: 0%;"></div>
                </div>

                <div class="quiz-header">
                    <span class="quiz-progress-text" id="quiz-progress"></span>
                </div>

                <!-- ドラッグ語群 -->
                <div id="word-bank-area" style="display: none;">
                    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 5px;">語群 (ドラッグして空欄に配置してください)</div>
                    <div id="word-bank" class="word-bank" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></div>
                </div>

                <div id="question-area" class="question-text"></div>
                <div id="options-area" class="options-grid"></div>

                <div id="explanation-panel" class="explanation-panel">
                    <div class="exp-title">📖 解説</div>
                    <div id="explanation-text" class="exp-body"></div>
                </div>

                <div id="essay-sample-area" class="self-grade-panel">
                    <div style="color: var(--neon-green); font-weight: bold; margin-bottom: 10px;">■ 解答例・解説</div>
                    <div id="essay-sample-text" style="line-height: 1.8; font-size: 1.05rem; margin-bottom: 20px;"></div>
                    <div style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                        <p style="color: var(--text-muted); font-size: 0.95rem;">自己採点を行ってください（スコアに加算されます）</p>
                        <div class="grade-btn-group">
                            <button class="grade-btn g-correct" onclick="submitSelfGrade(1, this)">〇 正解 (1点)</button>
                            <button class="grade-btn g-partial" onclick="submitSelfGrade(0.5, this)">△ 部分点 (0.5点)</button>
                            <button class="grade-btn g-incorrect" onclick="submitSelfGrade(0, this)">× 不正解 (0点)</button>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn btn-secondary" onclick="returnToProblemSelect()">問題一覧</button>
                    <button class="btn btn-primary" id="action-btn" onclick="handleAction()">解答する</button>
                </div>
                <div class="keyboard-hint" id="keyboard-hint"></div>
            </div>
        </section>

        <!-- ===== 結果 ===== -->
        <section id="view-result" class="view-section">
            <div class="glass-card" style="text-align: center;">
                <h2 style="font-size: 2rem; margin-bottom: 8px;">演習完了</h2>
                <p style="color: var(--text-muted); margin-bottom: 0;">あなたのスコア</p>

                <div class="score-circle pop-in" id="score-circle">
                    <div class="score-num" id="final-score">0/0</div>
                    <div style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">獲得スコア</div>
                </div>

                <div class="score-message" id="score-message"></div>

                <div class="result-summary-bar" id="result-summary-bar"></div>

                <div class="result-detail-wrap">
                    <table class="result-detail-table">
                        <thead>
                            <tr>
                                <th style="width:50px">問</th>
                                <th>タイトル</th>
                                <th style="width:60px; text-align:center;">結果</th>
                            </tr>
                        </thead>
                        <tbody id="result-detail-body"></tbody>
                    </table>
                </div>

                <div class="controls" style="margin-top: 20px; justify-content: center;">
                    <button class="btn btn-secondary" onclick="playSound('click'); returnToProblemSelect()">問題一覧へ戻る</button>
                    <button class="btn btn-primary" style="max-width: 280px;" onclick="playSound('click'); retryWrongAnswers()">✗ 不正解を再挑戦</button>
                </div>
            </div>
        </section>
    </main>

    <script>
    const questionDatabase = [
        ...(typeof database1 !== 'undefined' ? database1 : []),
        ...(typeof database2 !== 'undefined' ? database2 : [])
    ];

    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) audioCtx = new AudioContext();
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playTone(freq, type, duration, vol = 0.1, delay = 0) {
        if (!audioCtx) return;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + delay + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + duration);
    }
    function playSound(type) {
        initAudio();
        if (type === 'correct') {
            playTone(600, 'sine', 0.1, 0.1);
            playTone(800, 'sine', 0.2, 0.1, 0.1);
        } else if (type === 'incorrect') {
            playTone(300, 'sawtooth', 0.2, 0.1);
            playTone(250, 'sawtooth', 0.3, 0.1, 0.15);
        } else if (type === 'drop') {
            playTone(400, 'sine', 0.1, 0.05);
        } else if (type === 'click') {
            playTone(500, 'sine', 0.05, 0.05);
        } else if (type === 'complete') {
            [0, 0.12, 0.24].forEach((d, i) => playTone(500 + i * 150, 'sine', 0.25, 0.12, d));
        }
    }

    let currentSession      = null;
    let currentDbIndex      = -1;
    let playQueue           = [];
    let playQueuePos        = 0;
    let score               = 0;
    let isAnswerRevealed    = false;
    let isWaitingForSelfGrade = false;

    let userSelectionSingle   = null;
    let userSelectionMulti    = [];
    let userSelectionSequence = {};

    const sessionResults = {};

    const LS_KEY_SCORE    = 'kakomon_last_scores';
    const LS_KEY_SETTINGS = 'kakomon_quiz_settings';
    let selectedQuestionSet = new Set();
    let quizSettings = { randomOrder: false, randomOptions: false, randomWords: false };

    function loadLastScores() {
        try { return JSON.parse(localStorage.getItem(LS_KEY_SCORE) || '{}'); }
        catch { return {}; }
    }
    function saveLastScore(dbIndex, score, total) {
        const data = loadLastScores();
        data[dbIndex] = { score, total, time: Date.now() };
        localStorage.setItem(LS_KEY_SCORE, JSON.stringify(data));
    }
    function loadSettings() {
        try {
            const s = JSON.parse(localStorage.getItem(LS_KEY_SETTINGS) || '{}');
            if (typeof s.randomOrder   === 'boolean') quizSettings.randomOrder   = s.randomOrder;
            if (typeof s.randomOptions === 'boolean') quizSettings.randomOptions = s.randomOptions;
            if (typeof s.randomWords   === 'boolean') quizSettings.randomWords   = s.randomWords;
        } catch {}
    }
    function saveSettings() {
        localStorage.setItem(LS_KEY_SETTINGS, JSON.stringify(quizSettings));
    }

    function toggleSetting(key) {
        playSound('click');
        quizSettings[key] = !quizSettings[key];
        saveSettings();
        syncSettingUI();
    }
    function syncSettingUI() {
        const map = { randomOrder: 'toggle-random-order', randomOptions: 'toggle-random-options', randomWords: 'toggle-random-words' };
        Object.entries(map).forEach(([key, id]) => {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('on', quizSettings[key]);
        });
    }

    function switchView(viewId) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        const el = document.getElementById(viewId);
        el.classList.add('active');
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function returnToMenu() {
        playSound('click');
        switchView('view-menu');
    }
    function returnToProblemSelect() {
        playSound('click');
        if (currentSession) {
            renderProblemContainer(currentProblemTab);
            switchView('view-problem-select');
        } else {
            returnToMenu();
        }
    }

    function initApp() {
        loadSettings();
        syncSettingUI();
        const container  = document.getElementById('menu-container');
        container.innerHTML = '';
        const lastScores = loadLastScores();

        questionDatabase.forEach((qSet, index) => {
            const qCount = (qSet.questions && Array.isArray(qSet.questions)) ? qSet.questions.length : 0;
            const last   = lastScores[index];
            let badgeHtml = '';
            if (last) {
                const pct = last.total > 0 ? last.score / last.total : 0;
                let cls = pct >= 1 ? 'perfect' : pct >= 0.7 ? 'good' : pct >= 0.4 ? 'fair' : 'poor';
                badgeHtml = `<span class="last-score-badge ${cls}">前回 ${last.score}/${last.total}</span>`;
            }

            const card = document.createElement('div');
            card.className = 'glass-card menu-item';
            card.innerHTML = `
                <div class="menu-title">${qSet.categoryName}</div>
                <div class="menu-desc">${qSet.description}</div>
                <div class="menu-meta">
                    <span class="menu-count">全 ${qCount} 問</span>
                    ${badgeHtml}
                </div>
            `;
            card.onclick = () => { playSound('click'); showProblemSelection(index); };
            container.appendChild(card);
        });
    }

    function showProblemSelection(dbIndex) {
        initAudio();
        currentDbIndex = dbIndex;
        currentSession = questionDatabase[dbIndex];
        score = 0;
        selectedQuestionSet = new Set();
        if (!sessionResults[dbIndex]) sessionResults[dbIndex] = {};

        document.getElementById('problem-select-title').innerText = currentSession.categoryName;
        syncSettingUI();
        renderProblemContainer('all');
        switchView('view-problem-select');
    }

    let currentProblemTab = 'all';
    function switchProblemTab(tab) {
        currentProblemTab = tab;
        ['all', 'wrong', 'unanswered'].forEach(t => {
            document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
        });
        renderProblemContainer(tab);
    }

    function renderProblemContainer(filter) {
        const container = document.getElementById('problem-container');
        container.innerHTML = '';
        const results = sessionResults[currentDbIndex] || {};
        const allQuestions = currentSession.questions;

        const filteredIndices = allQuestions.map((q, i) => i).filter(i => {
            const mark = results[i] ? results[i].mark : null;
            if (filter === 'wrong' && mark !== 'incorrect') return false;
            if (filter === 'unanswered' && mark) return false;
            return true;
        });

        if (!filteredIndices.length) {
            container.innerHTML = `<div style="text-align:center; color:var(--text-muted); padding:30px;">
                該当する問題はありません。
            </div>`;
            updateSelCountBar();
            return;
        }

        const grid = document.createElement('div');
        grid.className = 'problem-grid';

        filteredIndices.forEach((idx) => {
            const q = allQuestions[idx];
            const res = results[idx];
            const mark = res ? res.mark : null;

            const btn = document.createElement('div');
            btn.className = 'problem-item';
            btn.id = `pitem-${idx}`;
            if (mark) btn.classList.add(`answered-${mark}`);
            if (selectedQuestionSet.has(idx)) btn.classList.add('selected');

            const titleText = q.title || `問 ${idx + 1}`;
            let innerHtml = `<span>${titleText}</span>`;
            
            if (mark) {
                const icon = mark === 'correct' ? '○' : mark === 'partial' ? '△' : '✗';
                innerHtml += `<span class="result-mark mark-${mark}">${icon}</span>`;
            }
            btn.innerHTML = innerHtml;

            btn.onclick = (e) => {
                e.stopPropagation();
                playSound('click');
                toggleQuestionSelect(idx);
            };
            grid.appendChild(btn);
        });

        container.appendChild(grid);
        updateSelCountBar();
    }

    function toggleQuestionSelect(idx) {
        if (selectedQuestionSet.has(idx)) selectedQuestionSet.delete(idx);
        else selectedQuestionSet.add(idx);
        
        const btn = document.getElementById(`pitem-${idx}`);
        if (btn) btn.classList.toggle('selected', selectedQuestionSet.has(idx));
        updateSelCountBar();
    }

    function selectAllQuestions(doSelect) {
        playSound('click');
        const allQ = currentSession.questions;
        const results = sessionResults[currentDbIndex] || {};
        const filteredIndices = allQ.map((q, i) => i).filter(i => {
            const mark = results[i] ? results[i].mark : null;
            if (currentProblemTab === 'wrong' && mark !== 'incorrect') return false;
            if (currentProblemTab === 'unanswered' && mark) return false;
            return true;
        });

        if (doSelect) filteredIndices.forEach(i => selectedQuestionSet.add(i));
        else filteredIndices.forEach(i => selectedQuestionSet.delete(i));
        
        renderProblemContainer(currentProblemTab);
    }

    function updateSelCountBar() {
        document.getElementById('sel-count').textContent = selectedQuestionSet.size;
    }

    function startSelectedQuestions() {
        playSound('click');
        if (!selectedQuestionSet.size) {
            alert('問題を選択してください。');
            return;
        }
        let indices = Array.from(selectedQuestionSet).sort((a, b) => a - b);
        if (quizSettings.randomOrder) indices = [...indices].sort(() => Math.random() - 0.5);
        startSpecificQuestion(indices);
    }

    function startFilteredQuiz(mode) {
        playSound('click');
        const results = sessionResults[currentDbIndex] || {};
        let indices = currentSession.questions.map((_, i) => i);
        if (mode === 'wrong') {
            indices = indices.filter(i => results[i] && results[i].mark === 'incorrect');
            if (!indices.length) { alert('不正解の問題はありません。'); return; }
        } else if (mode === 'random') {
            indices = [...indices].sort(() => Math.random() - 0.5);
        } else if (quizSettings.randomOrder) {
            indices = [...indices].sort(() => Math.random() - 0.5);
        }
        startSpecificQuestion(indices);
    }

    function startSpecificQuestion(queueIndices) {
        playQueue = queueIndices;
        playQueuePos = 0;
        score = 0;
        renderQuestion();
        switchView('view-quiz');
    }

    function shuffleArray(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function syncSameIdInputs(changedId, newValue) {
        document.querySelectorAll(`.blank-input[data-id="${changedId}"]`).forEach(inp => {
            if (inp.value !== newValue) inp.value = newValue;
        });
    }

    function renderQuestion() {
        const qOrig = currentSession.questions[playQueue[playQueuePos]];
        const q = Object.assign({}, qOrig);

        isAnswerRevealed = false;
        isWaitingForSelfGrade = false;
        userSelectionSingle = null;
        userSelectionMulti = [];
        userSelectionSequence = {};

        const pct = Math.round((playQueuePos / playQueue.length) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
        document.getElementById('quiz-progress').innerText = `${playQueuePos + 1} / ${playQueue.length}`;

        const qArea = document.getElementById('question-area');
        const oArea = document.getElementById('options-area');
        const wArea = document.getElementById('word-bank-area');
        const wBank = document.getElementById('word-bank');
        const eArea = document.getElementById('essay-sample-area');
        const expPanel = document.getElementById('explanation-panel');
        const actionBtn = document.getElementById('action-btn');
        const kbHint = document.getElementById('keyboard-hint');

        oArea.innerHTML = '';
        wBank.innerHTML = '';
        wArea.style.display = 'none';
        eArea.style.display = 'none';
        expPanel.style.display = 'none';
        document.getElementById('explanation-text').innerHTML = '';
        actionBtn.style.display = 'block';
        actionBtn.innerText = '解答する';
        actionBtn.disabled = false;
        kbHint.innerHTML = '';

        const questionLabel = q.title || `第 ${playQueue[playQueuePos] + 1} 問`;
        const labelHtml = `<div class="question-number-label">${questionLabel}</div>`;

        if (q.type === 'single' || q.type === 'multi' || q.type === 'sequence') {
            qArea.innerHTML = labelHtml + q.text.replace(/\n/g, '<br>');
        } else if (q.type === 'fill') {
            let formattedText = q.html.replace(/\[\[([0-9a-zA-Zア-ン]+)\]\]/g, (_, p1) =>
                `<span class="blank-wrap">` +
                    `<span class="blank-num-hint">${p1}</span>` +
                    `<input type="text" class="blank-input" data-id="${p1}" placeholder="${p1}" autocomplete="off">` +
                `</span>`
            );
            qArea.innerHTML = labelHtml + formattedText;
            qArea.querySelectorAll('.blank-input').forEach(inp => {
                inp.addEventListener('input', () => syncSameIdInputs(inp.dataset.id, inp.value));
                inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !isAnswerRevealed) handleAction(); });
            });
            kbHint.innerHTML = '<kbd>Enter</kbd> で解答';
        } else if (q.type === 'drag-fill') {
            wArea.style.display = 'block';
            let formattedText = q.html.replace(/\[\[([0-9a-zA-Zア-ン]+)\]\]/g, (_, p1) =>
                `<span class="drop-zone-wrap">` +
                    `<span class="drop-zone-num-hint">${p1}</span>` +
                    `<span class="drop-zone" data-id="${p1}" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event)"></span>` +
                `</span>`
            );
            qArea.innerHTML = labelHtml + formattedText;

            let words = quizSettings.randomWords ? shuffleArray(q.wordBank)   : [...q.wordBank].sort(() => Math.random() - 0.5);
            words.forEach((word, idx) => {
                const div = document.createElement('div');
                div.className   = 'draggable-item';
                div.draggable   = true;
                div.id          = `drag-item-${idx}`;
                div.dataset.val = word;
                div.innerText   = word;
                div.addEventListener('dragstart',  drag);
                div.addEventListener('touchstart', handleTouchStart, { passive: false });
                div.addEventListener('touchmove',  handleTouchMove,  { passive: false });
                div.addEventListener('touchend',   handleTouchEnd);
                wBank.appendChild(div);
            });
        } else if (q.type === 'essay') {
            qArea.innerHTML = labelHtml + q.text.replace(/\n/g, '<br>') +
                `<textarea class="essay-textarea" placeholder="ここに解答を記述してください..."></textarea>`;
            actionBtn.innerText = '解答例を確認する';
            kbHint.innerHTML = '<kbd>Enter</kbd> で解答確認 （Shift+Enterで改行）';
        }

        if (q.type === 'single') {
            const opts = quizSettings.randomOptions ? shuffleArray(q.options) : q.options;
            opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="shortcut-badge">${i + 1}</span>${opt.text}`;
                btn.dataset.optId = opt.id;
                btn.onclick = () => {
                    if (isAnswerRevealed) return;
                    playSound('click');
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    userSelectionSingle = opt.id;
                };
                oArea.appendChild(btn);
            });
            kbHint.innerHTML = '数字キー <kbd>1</kbd>〜<kbd>' + opts.length + '</kbd> で選択　<kbd>Enter</kbd> で解答';
        } else if (q.type === 'multi') {
            const opts = quizSettings.randomOptions ? shuffleArray(q.options) : q.options;
            opts.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerHTML = `<span class="shortcut-badge">${i + 1}</span>${opt.text}`;
                btn.dataset.optId = opt.id;
                btn.onclick = () => {
                    if (isAnswerRevealed) return;
                    playSound('click');
                    if (userSelectionMulti.includes(opt.id)) {
                        userSelectionMulti = userSelectionMulti.filter(id => id !== opt.id);
                        btn.classList.remove('selected');
                    } else if (userSelectionMulti.length < q.req) {
                        userSelectionMulti.push(opt.id);
                        btn.classList.add('selected');
                    }
                };
                oArea.appendChild(btn);
            });
            kbHint.innerHTML = '数字キー <kbd>1</kbd>〜<kbd>' + opts.length + '</kbd> でトグル選択　<kbd>Enter</kbd> で解答';
        } else if (q.type === 'sequence') {
            q.parts.forEach((part, pIdx) => {
                const row = document.createElement('div');
                row.className = 'seq-row';
                row.innerHTML = `<span class="seq-label">${part.label}</span>`;
                const grp = document.createElement('div');
                grp.className = 'seq-btn-group';
                const partOpts = quizSettings.randomOptions ? shuffleArray(part.options) : part.options;
                partOpts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.style.flex = '1'; btn.style.textAlign = 'center';
                    btn.innerText = opt.text;
                    btn.dataset.optId = opt.id;
                    btn.onclick = () => {
                        if (isAnswerRevealed) return;
                        playSound('click');
                        grp.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        userSelectionSequence[pIdx] = opt.id;
                    };
                    grp.appendChild(btn);
                });
                row.appendChild(grp);
                oArea.appendChild(row);
            });
            kbHint.innerHTML = '<kbd>Enter</kbd> で解答';
        }
    }

    function allowDrop(ev) {
        ev.preventDefault();
        const t = getDropZoneTarget(ev.target);
        if (t) t.classList.add('drag-over');
    }
    function dragLeave(ev) {
        const t = getDropZoneTarget(ev.target);
        if (t) t.classList.remove('drag-over');
    }
    function getDropZoneTarget(el) {
        if (el.classList.contains('drop-zone')) return el;
        if (el.parentNode && el.parentNode.classList.contains('drop-zone')) return el.parentNode;
        return null;
    }
    function drag(ev) {
        if (isAnswerRevealed) return;
        ev.dataTransfer.setData('text', ev.target.id);
    }
    function drop(ev) {
        ev.preventDefault();
        if (isAnswerRevealed) return;

        let target = ev.target;
        if (target.classList.contains('drag-over')) target.classList.remove('drag-over');
        if (target.classList.contains('draggable-item')) target = target.parentNode;

        const data = ev.dataTransfer.getData('text');
        const draggedEl = document.getElementById(data);
        if (!draggedEl) return;

        if (target.classList.contains('drop-zone')) {
            if (target.hasChildNodes()) {
                Array.from(target.children).forEach(child => {
                     if(child.id) document.getElementById('word-bank').appendChild(child);
                     else child.remove(); 
                });
            }
            target.appendChild(draggedEl);
            playSound('drop');
            syncSameIdDropZoneAfterDrop(target);
        } else if (target.id === 'word-bank' || target.classList.contains('word-bank')) {
            document.getElementById('word-bank').appendChild(draggedEl);
            playSound('drop');
        }
    }

    function syncSameIdDropZoneAfterDrop(changedZone) {
        const id = changedZone.dataset.id;
        if (!id) return;
        document.querySelectorAll(`.drop-zone[data-id="${id}"]`).forEach(zone => {
            if (zone === changedZone) return;
            if (zone.hasChildNodes()) {
                Array.from(zone.children).forEach(child => {
                    if (child.id) document.getElementById('word-bank').appendChild(child);
                    else child.remove();
                });
            }
            const srcItem = changedZone.firstChild;
            if (srcItem) {
                const clone = srcItem.cloneNode(true);
                clone.draggable = false;
                clone.removeAttribute('id');
                zone.appendChild(clone);
            }
        });
    }

    let dragGhost = null, activeDragEl = null, touchOffsetX = 0, touchOffsetY = 0;
    function handleTouchStart(e) {
        if (isAnswerRevealed) return;
        activeDragEl = e.target;
        const touch = e.touches[0];
        const rect  = activeDragEl.getBoundingClientRect();
        dragGhost = activeDragEl.cloneNode(true);
        Object.assign(dragGhost.style, {
            position: 'fixed', left: rect.left + 'px', top: rect.top + 'px',
            width: rect.width + 'px', height: rect.height + 'px',
            opacity: '0.8', zIndex: '9999', pointerEvents: 'none', margin: '0'
        });
        document.body.appendChild(dragGhost);
        activeDragEl.style.opacity = '0.3';
        touchOffsetX = touch.clientX - rect.left;
        touchOffsetY = touch.clientY - rect.top;
        playSound('click');
    }
    function handleTouchMove(e) {
        if (!dragGhost) return;
        e.preventDefault();
        const touch = e.touches[0];
        dragGhost.style.left = (touch.clientX - touchOffsetX) + 'px';
        dragGhost.style.top  = (touch.clientY - touchOffsetY)  + 'px';
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
        if (target && target.classList.contains('drop-zone')) target.classList.add('drag-over');
    }
    function handleTouchEnd(e) {
        if (!dragGhost || !activeDragEl) return;
        const touch = e.changedTouches[0];
        dragGhost.remove(); dragGhost = null;
        activeDragEl.style.opacity = '1';
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('drag-over'));
        if (target) {
            let dropTarget = target;
            if (dropTarget.classList.contains('draggable-item')) dropTarget = dropTarget.parentNode;
            if (dropTarget.classList.contains('drop-zone')) {
                if (dropTarget.hasChildNodes()) {
                    Array.from(dropTarget.children).forEach(child => {
                        if(child.id) document.getElementById('word-bank').appendChild(child);
                        else child.remove();
                    });
                }
                dropTarget.appendChild(activeDragEl);
                playSound('drop');
                syncSameIdDropZoneAfterDrop(dropTarget);
            } else if (dropTarget.id === 'word-bank' || dropTarget.closest('.word-bank') || dropTarget.closest('#word-bank-area')) {
                document.getElementById('word-bank').appendChild(activeDragEl);
                playSound('drop');
            }
        }
        activeDragEl = null;
    }

    document.addEventListener('keydown', e => {
        if (!document.getElementById('view-quiz').classList.contains('active')) return;
        const actionBtn = document.getElementById('action-btn');
        const q = currentSession && playQueue.length ? currentSession.questions[playQueue[playQueuePos]] : null;
        if (!q) return;

        if (e.key === 'Enter') {
            if (q.type === 'essay' && e.shiftKey) return;
            if (actionBtn.style.display !== 'none') { e.preventDefault(); handleAction(); }
            return;
        }

        if (isAnswerRevealed) return;
        const num = parseInt(e.key);
        if (isNaN(num) || num < 1) return;

        if (q.type === 'single' || q.type === 'multi') {
            const btns = document.querySelectorAll('#options-area .option-btn');
            if (btns[num - 1]) btns[num - 1].click();
        }
    });

    function handleAction() {
        if (isWaitingForSelfGrade) return;
        playSound('click');

        if (!isAnswerRevealed) checkAnswer();
        else {
            playQueuePos++;
            if (playQueuePos < playQueue.length) renderQuestion();
            else {
                const total = playQueue.length;
                saveLastScore(currentDbIndex, score, total);
                initApp();
                showResultScreen(total);
            }
        }
    }

    function submitSelfGrade(points, btn) {
        const qIdx = playQueue[playQueuePos];
        const mark = points >= 1 ? 'correct' : points > 0 ? 'partial' : 'incorrect';
        sessionResults[currentDbIndex][qIdx] = { mark, score: points };
        score += points;
        isWaitingForSelfGrade = false;
        isAnswerRevealed = true;

        document.querySelectorAll('.grade-btn').forEach(b => b.style.opacity = '0.4');
        btn.style.opacity = '1';
        btn.style.transform = 'scale(1.05)';

        const actionBtn = document.getElementById('action-btn');
        actionBtn.style.display = 'block';
        actionBtn.innerText = playQueuePos + 1 < playQueue.length ? '次の問題へ' : '結果を見る';
        updateProgressBar();
        playSound(mark === 'correct' ? 'correct' : 'incorrect');
    }

    function checkAnswer() {
        const q = currentSession.questions[playQueue[playQueuePos]];
        const qIdx = playQueue[playQueuePos];
        const actionBtn = document.getElementById('action-btn');

        if (q.type === 'essay') {
            isWaitingForSelfGrade = true;
            actionBtn.style.display = 'none';
            document.getElementById('essay-sample-text').innerHTML = q.sampleAnswer.replace(/\n/g, '<br>');
            document.getElementById('essay-sample-area').style.display = 'block';
            const ta = document.querySelector('.essay-textarea');
            if (ta) ta.readOnly = true;
            return;
        }

        isAnswerRevealed = true;
        actionBtn.innerText = playQueuePos + 1 < playQueue.length ? '次の問題へ' : '結果を見る';
        updateProgressBar();

        let isCorrectGlobal = true;

        if (q.type === 'single') {
            if (userSelectionSingle === null) isCorrectGlobal = false;
            else isCorrectGlobal = (userSelectionSingle === q.answer);

            document.querySelectorAll('.option-btn').forEach(btn => {
                const optId = btn.dataset.optId;
                if (optId === q.answer) {
                    btn.style.borderColor = 'var(--neon-green)';
                    btn.style.background = 'rgba(16, 185, 129, 0.2)';
                    btn.innerHTML += ' <span style="float:right; color:var(--neon-green);">✓ 正解</span>';
                } else if (optId === userSelectionSingle && !isCorrectGlobal) {
                    btn.style.borderColor = 'var(--neon-red)';
                    btn.style.background = 'rgba(239, 68, 68, 0.2)';
                }
            });
        } else if (q.type === 'multi') {
            if (!userSelectionMulti.length) {
                isCorrectGlobal = false;
            } else {
                isCorrectGlobal = q.answer.every(a => userSelectionMulti.includes(a)) && q.answer.length === userSelectionMulti.length;
            }
            document.querySelectorAll('.option-btn').forEach(btn => {
                const optId = btn.dataset.optId;
                if (q.answer.includes(optId)) {
                    btn.style.borderColor = 'var(--neon-green)';
                    btn.style.background = 'rgba(16, 185, 129, 0.2)';
                    btn.innerHTML += ' <span style="float:right; color:var(--neon-green);">✓</span>';
                } else if (userSelectionMulti.includes(optId)) {
                    btn.style.borderColor = 'var(--neon-red)';
                    btn.style.background = 'rgba(239, 68, 68, 0.2)';
                }
            });
        } else if (q.type === 'sequence') {
            let allCorrect = true;
            document.querySelectorAll('.seq-row').forEach((row, idx) => {
                const correctAns = q.parts[idx].answer;
                const userAns = userSelectionSequence[idx];
                if (userAns === undefined || userAns !== correctAns) allCorrect = false;
                row.querySelectorAll('.option-btn').forEach(btn => {
                    const optId = btn.dataset.optId;
                    if (optId === correctAns) {
                        btn.style.borderColor = 'var(--neon-green)';
                        btn.style.background = 'rgba(16, 185, 129, 0.2)';
                        btn.innerHTML += ' <span style="color:var(--neon-green);">✓</span>';
                    } else if (optId === userAns && userAns !== correctAns) {
                        btn.style.borderColor = 'var(--neon-red)';
                        btn.style.background = 'rgba(239, 68, 68, 0.2)';
                    }
                });
            });
            isCorrectGlobal = allCorrect;
        } else if (q.type === 'fill') {
            const seen = {};
            let allCorrect = true;
            document.querySelectorAll('.blank-input').forEach(input => {
                const id = input.dataset.id;
                const val = input.value.trim();
                const correctAnswer = q.answers[id];
                if (val === correctAnswer) {
                    input.classList.add('correct');
                } else {
                    input.classList.add('incorrect');
                    allCorrect = false;
                    if (!seen[id]) {
                        seen[id] = true;
                        const label = document.createElement('span');
                        label.className = 'correct-answer-label';
                        label.innerText = `(${correctAnswer})`;
                        input.parentNode.insertBefore(label, input.nextSibling);
                    }
                }
                input.readOnly = true;
            });
            isCorrectGlobal = allCorrect;
        } else if (q.type === 'drag-fill') {
            const seen = {};
            let allCorrect = true;
            document.querySelectorAll('.drop-zone').forEach(zone => {
                const id = zone.dataset.id;
                const correctAnswer = q.answers[id];
                const val = zone.textContent.trim();
                if (val === correctAnswer) {
                    zone.classList.add('correct');
                } else {
                    zone.classList.add('incorrect');
                    allCorrect = false;
                    if (!seen[id]) {
                        seen[id] = true;
                        const label = document.createElement('span');
                        label.className = 'correct-answer-label';
                        label.innerText = `(${correctAnswer})`;
                        zone.parentNode.insertBefore(label, zone.nextSibling);
                    }
                }
                const item = zone.querySelector('.draggable-item');
                if (item) item.draggable = false;
            });
            isCorrectGlobal = allCorrect;
        }

        const mark = isCorrectGlobal ? 'correct' : 'incorrect';
        sessionResults[currentDbIndex][qIdx] = { mark, score: isCorrectGlobal ? 1 : 0 };
        if (isCorrectGlobal) score++;

        playSound(isCorrectGlobal ? 'correct' : 'incorrect');

        if (q.explanation) {
            const panel = document.getElementById('explanation-panel');
            document.getElementById('explanation-text').innerHTML = q.explanation.replace(/\n/g, '<br>');
            panel.style.display = 'block';
        }
    }

    function updateProgressBar() {
        const pct = Math.round(((playQueuePos + 1) / playQueue.length) * 100);
        document.getElementById('progress-bar').style.width = pct + '%';
    }

    function showResultScreen(total) {
        playSound('complete');
        const pct = total > 0 ? score / total : 0;
        document.getElementById('final-score').innerText = `${score} / ${total}`;

        const msgEl = document.getElementById('score-message');
        if (pct >= 1)       { msgEl.style.color = 'var(--neon-green)';  msgEl.innerText = '🎉 パーフェクト！素晴らしい！'; }
        else if (pct >= 0.8){ msgEl.style.color = 'var(--neon-blue)';   msgEl.innerText = '👍 よくできました！'; }
        else if (pct >= 0.5){ msgEl.style.color = 'var(--neon-yellow)'; msgEl.innerText = '📚 もう少し！復習を続けよう。'; }
        else                { msgEl.style.color = 'var(--neon-red)';    msgEl.innerText = '💪 復習が必要です。再挑戦しよう！'; }

        const results = sessionResults[currentDbIndex];
        let cCorrect = 0, cPartial = 0, cIncorrect = 0;
        playQueue.forEach(qi => {
            const r = results[qi];
            if (!r) return;
            if (r.mark === 'correct') cCorrect++;
            else if (r.mark === 'partial') cPartial++;
            else cIncorrect++;
        });
        document.getElementById('result-summary-bar').innerHTML = `
            <div class="result-stat s-correct">
                <div class="stat-num">${cCorrect}</div>
                <div class="stat-label">正解</div>
            </div>
            <div style="color:var(--text-muted); font-size:2rem; align-self:center;">/</div>
            <div class="result-stat s-partial">
                <div class="stat-num" style="color:var(--neon-yellow);">${cPartial}</div>
                <div class="stat-label">部分点</div>
            </div>
            <div style="color:var(--text-muted); font-size:2rem; align-self:center;">/</div>
            <div class="result-stat s-incorrect">
                <div class="stat-num" style="color:var(--neon-red);">${cIncorrect}</div>
                <div class="stat-label">不正解</div>
            </div>
        `;

        const tbody = document.getElementById('result-detail-body');
        tbody.innerHTML = '';
        playQueue.forEach((qi, pos) => {
            const q = currentSession.questions[qi];
            const res = results[qi];
            const mark = res ? res.mark : null;
            let icon = '—', cls = '';
            if (mark === 'correct') { icon = '○'; cls = 'ci'; }
            else if (mark === 'partial') { icon = '△'; cls = 'cp'; }
            else if (mark === 'incorrect') { icon = '✗'; cls = 'cx'; }
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="color:var(--text-muted);">${pos + 1}</td>
                <td>${q.title || `第 ${qi + 1} 問`}</td>
                <td class="result-mark-cell"><span class="mark-icon ${cls}">${icon}</span></td>
            `;
            tbody.appendChild(tr);
        });
        switchView('view-result');
    }

    function retryWrongAnswers() {
        playSound('click');
        const results = sessionResults[currentDbIndex] || {};
        const wrongIds = playQueue.filter(qi => results[qi] && results[qi].mark === 'incorrect');
        if (!wrongIds.length) { alert('不正解の問題はありません！'); return; }
        startSpecificQuestion(wrongIds);
    }
    </script>
</body>
